<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Hub</title>
  <!-- <link rel="icon" type="image/png" href=""/> -->

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Rubik+Pixels&family=VT323&display=swap" rel="stylesheet">

  <!-- Google Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home" />

  <!-- Font Awesome (Socials) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Google Sign-In -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

  <header style="position: relative;">
    <div class="admin-wrapper">
      <div class="portal-title">

        <div class="LogEth">Log♧Eth</div>
        <div class="admin-portal">Admin Portal</div>

        <img src="images/newspaper-coffee-hd.png" alt="newspaper-coffee pixelart" class="admin-image" width="10">

        <button id="adminSignOutBtn" onclick="import('./admin-auth.js').then(m => m.adminSignOut())" style="
          font-family: inherit;
          font-size: 13px;
          font-weight: 500;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          color: var(--white, #fafaf8);
          background-color: var(--teal, #2a6b65);
          border: none;
          border-radius: 8px;
          padding: 9px 20px;
          cursor: pointer;
          margin-left: 16px;
          transition: background 0.2s;
          align-items: center;
          justify-self: end;
        " onmouseover="this.style.backgroundColor='var(--olive,#e86100)'"
           onmouseout="this.style.backgroundColor='var(--teal,#2a6b65)'">
          Sign Out
        </button>
      </div>
    </div>
  </header>

<!-- Main Content -->
<main class="admin-content">


    
  <div class="admin-grid">

    <!-- left column: output -->
    <div class="admin-output-col">
        <!-- <a class="return-link" href="index.html">&#x2039; return to homepage</a> -->
      <h2 class="admin-section-title" style="background-color: #F9FFF9;">Results</h2>
      <div id="suggestionsOutput" class="suggestions-output">
        <p class="output-placeholder">Your fetched articles will appear here.</p>
      </div>
    </div>

    <!-- right column: inputs -->
    <div class="admin-control-col">
      <h1>Tech News Fetcher</h1>
      <!-- <div id="suggestionsOutput">
          <p>Enter a topic and click "Fetch News" to get started.</p>
      </div> -->

      <div class="agent-card">
        <h2 class="admin-section-title">Fetch News</h2>

        <div class="input-group">
          <label for="topicInput">Topic</label>
          <input type="text" id="topicInput" placeholder="e.g., AI ethics">
        </div>

        <div class="input-group">
          <label for="numSuggestionsInput">Number of suggestions</label>
          <input type="number" id="numSuggestionsInput" value="3" min="1" max="20">
        </div>

        <button id="fetchButton">Fetch News</button>
      </div>
    </div>

  </div>
</main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">

      <div class="footer-section">
        <div class="footer-copyright">
          &copy; 2026 Logos et Ethos.<br>
          <a href="./admin.html" class="admin-portal-link">Admin Portal</a>
        </div>
        <div class="footer-signature">Log ♣︎ Eth</div>
        <div class="footer-socials">
          <a href="" target="_blank" aria-label="LinkedIn" class="fa fa-linkedin"></a>
          <a href="https://github.com/Hiba-Assamaouat" target="_blank" aria-label="GitHub" class="fa fa-github"></a>
          <a href="" target="_blank" aria-label="Envelope" class="fa fa-envelope"></a>
        </div>
      </div>

      <!-- Footer Navigation -->
      <nav class="footer-links">
        <a href="./index.html">Home</a> ♧
        <a href="1-events.html">Events</a> ♧
        <a href="2-spots.html">Spots</a> ♧
        <a href="3-articles.html">Articles</a> ♧
        <a href="4-latest.html">The Latest</a> ♧
        <a href="5-contact.html">Contact</a> ♧
        <a href="6-signup.html">Sign Up</a>
      </nav>

    </div>
  </footer>

  <script src="script.js"></script>

  <!-- Firebase admin guard -->
  <script type="module">
    import { guardAdminPage } from "./admin-auth.js";
    guardAdminPage();
  </script>

</body>
</html>
